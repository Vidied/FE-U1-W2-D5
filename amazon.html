<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Amazon.epicode</title>
    <link rel="stylesheet" href="./Amazon Page/assets/css/reset.css" />
    <link rel="stylesheet" href="./Amazon Page/assets/css/normalize.css" />
    <link rel="stylesheet" href="./Amazon Page/assets/css/style.css" />
  </head>
  <body>
    <header id="top">
      <div class="logo">
        <img src="./Amazon Page/assets/images/logo.png" alt="logo Amazon" />
      </div>
      <div class="link miniwhite">
        <a href="#">All</a>
        <a href="#">Today's deals</a>
        <a href="#">Customer Service</a>
        <a href="#">Registry</a>
        <a href="#">Gift Cards</a>
        <a href="#">Sell</a>
      </div>
    </header>
    <main>
      <section class="txtcenter">
        <article class="holiday">
          <h2 class="miniwhite">Shop All Holiday Gift Cards</h2>
        </article>
        <article class="holiday-banner">
          <div>
            <h1>Holiday Gift Guides</h1>
            <p class="miniwhite">Be a go-gifter</p>
          </div>
        </article>
      </section>
      <section class="minibox">
        <p>Find the perfect gift</p>
        <a href="#" class="shop">Shop now</a>
        <img
          src="./Amazon Page/assets/images/img_1.jpg"
          alt="Immagine di un Kindle table"
        />
        <img
          src="./Amazon Page/assets/images/img_2.jpg"
          alt="Immagine di un laptop e un vaso"
        />
        <img
          src="./Amazon Page/assets/images/img_3.jpg"
          alt="Immagine di due smartwatch"
        />
        <img
          src="./Amazon Page/assets/images/img_4.jpg"
          alt="Immagine di un cane e un gatto"
        />
      </section>
      <section>
        <article>
          <img
            src="./Amazon Page/assets/images/img_9.png"
            alt="immagine di un oculus rift"
          />
          <p>Play the gifting game</p>
          <a href="#" class="shop">Shop gaming</a>
        </article>
        <article>
          <img
            src="./Amazon Page/assets/images/img_10.png"
            alt="immagine di varie cose su un comodino"
          />
          <p>The sound of cheer</p>
          <a href="#">Shop Audio & Accessories</a>
        </article>
      </section>
    </main>
    <footer>
      <div>
        <a href="#top">Back to top</a>
      </div>
      <div>
        <img src="./Amazon Page/assets/images/logo.png" alt="logo Amazon" />
      </div>
    </footer>
  </body>
</html>
